<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EVE Size Explorer - Ship Scale Comparison</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a12;
            color: #c0c0c0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        header {
            background: rgba(18, 18, 30, 0.95);
            border-bottom: 1px solid #1a1a2e;
            padding: 12px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 1.2em;
            color: #e0e0e0;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: inline;
        }

        header h1 span { color: #4fc3f7; }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls label {
            font-size: 0.75em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls select, .controls input[type="text"] {
            background: #1a1a2e;
            border: 1px solid #2a2a4e;
            color: #c0c0c0;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .controls select:focus, .controls input:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .scale-info {
            background: #1a1a2e;
            border: 1px solid #2a2a4e;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 0.8em;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .scale-info strong { color: #4fc3f7; }

        #viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: grab;
            touch-action: none;
        }

        #viewport.dragging { cursor: grabbing; }

        .ruler {
            position: fixed;
            right: 16px;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            z-index: 50;
            pointer-events: none;
        }

        .ruler-bar {
            width: 3px;
            background: #4fc3f7;
            position: relative;
            opacity: 0.7;
        }

        .ruler-label {
            color: #4fc3f7;
            font-size: 11px;
            margin-top: 3px;
            opacity: 0.7;
        }

        .ruler-tick {
            position: absolute;
            right: 0;
            width: 10px;
            height: 1px;
            background: #4fc3f7;
        }

        .tooltip {
            display: none;
            position: fixed;
            background: rgba(18, 18, 30, 0.95);
            border: 1px solid #4fc3f7;
            border-radius: 6px;
            padding: 10px 14px;
            z-index: 200;
            pointer-events: none;
            min-width: 180px;
            backdrop-filter: blur(10px);
        }

        .tooltip.visible { display: block; }

        .tooltip h3 {
            color: #4fc3f7;
            font-size: 0.95em;
            margin-bottom: 4px;
        }

        .tooltip .detail {
            font-size: 0.8em;
            color: #888;
            line-height: 1.5;
        }

        .tooltip .detail strong { color: #c0c0c0; }

        .help-hint {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75em;
            color: #444;
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="viewport"></div>

<header>
    <h1>EVE <span>Size</span> Explorer</h1>
    <div class="controls">
        <div class="control-group">
            <label>Group</label>
            <select id="group-filter">
                <option value="all">All Ships</option>
            </select>
        </div>
        <div class="control-group">
            <label>Search</label>
            <input type="text" id="search" placeholder="Ship name...">
        </div>
        <div class="control-group">
            <label>Sort</label>
            <select id="sort-by">
                <option value="radius-desc">Largest first</option>
                <option value="radius-asc">Smallest first</option>
                <option value="name-asc">Name A-Z</option>
                <option value="group">By group</option>
            </select>
        </div>
        <div class="scale-info">
            <span>Ships: <strong id="ship-count">0</strong></span>
            <span>|</span>
            <span id="scale-text"></span>
        </div>
    </div>
</header>

<div class="ruler" id="ruler"></div>

<div class="tooltip" id="tooltip">
    <h3 id="tip-name"></h3>
    <div class="detail" id="tip-detail"></div>
</div>

<div class="help-hint">Scroll to zoom &middot; Drag to pan &middot; Hover for details</div>

<script>
const IMAGE_BASE = 'https://images.evetech.net/types';

let allShips = [];
let filteredShips = [];
let shipLayout = []; // { ship, x, y, size } in world-meters coordinates

// Camera: world coordinates visible at screen center
let cam = { x: 0, y: 0, pxPerMeter: 0.1 };
const MIN_SCALE = 0.0002;
const MAX_SCALE = 50;

// Image cache
const imgCache = new Map();

// DOM
const viewport = document.getElementById('viewport');
const canvas = document.createElement('canvas');
canvas.style.width = '100%';
canvas.style.height = '100%';
viewport.appendChild(canvas);
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); draw(); });
resizeCanvas();

// ---- Data loading ----
async function loadData() {
    const resp = await fetch('data/ships.json');
    const data = await resp.json();
    allShips = data.ships.filter(s => s.radius > 0);

    const groups = [...new Set(allShips.map(s => s.group))].sort();
    const groupSelect = document.getElementById('group-filter');
    groups.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = `${g} (${allShips.filter(s => s.group === g).length})`;
        groupSelect.appendChild(opt);
    });

    applyFilters();
}

function applyFilters() {
    const group = document.getElementById('group-filter').value;
    const search = document.getElementById('search').value.toLowerCase();
    const sortBy = document.getElementById('sort-by').value;

    filteredShips = allShips.filter(s => {
        if (group !== 'all' && s.group !== group) return false;
        if (search && !s.name.toLowerCase().includes(search)) return false;
        return true;
    });

    switch (sortBy) {
        case 'radius-desc': filteredShips.sort((a, b) => b.radius - a.radius); break;
        case 'radius-asc': filteredShips.sort((a, b) => a.radius - b.radius); break;
        case 'name-asc': filteredShips.sort((a, b) => a.name.localeCompare(b.name)); break;
        case 'group': filteredShips.sort((a, b) => a.group.localeCompare(b.group) || b.radius - a.radius); break;
    }

    document.getElementById('ship-count').textContent = filteredShips.length;
    layoutShips();
    fitToContent();
    draw();
}

// ---- Layout: pack ships in a grid, aligned at bottom, sorted left to right ----
function layoutShips() {
    shipLayout = [];
    if (filteredShips.length === 0) return;

    // Each ship occupies a cell based on its diameter
    // We lay them out in a row, aligned at their bottom edge (y=0)
    const padding = 0.15; // 15% padding between ships relative to their size

    let cursorX = 0;

    for (const ship of filteredShips) {
        const diameter = ship.radius * 2;
        const gap = diameter * padding;
        const x = cursorX + diameter / 2; // center of ship
        const y = -diameter / 2; // bottom at y=0, center is at -radius
        shipLayout.push({ ship, x, y, size: diameter });
        cursorX += diameter + gap;
    }
}

// ---- World <-> Screen transforms ----
function worldToScreen(wx, wy) {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    return {
        sx: cx + (wx - cam.x) * cam.pxPerMeter,
        sy: cy - (wy - cam.y) * cam.pxPerMeter // flip Y: world up = screen up
    };
}

function screenToWorld(sx, sy) {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    return {
        wx: cam.x + (sx - cx) / cam.pxPerMeter,
        wy: cam.y - (sy - cy) / cam.pxPerMeter
    };
}

// ---- Image loading ----
function getImage(typeID, sizePx) {
    const res = sizePx > 256 ? 1024 : sizePx > 64 ? 512 : 256;
    const key = `${typeID}_${res}`;
    if (imgCache.has(key)) return imgCache.get(key);

    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = `${IMAGE_BASE}/${typeID}/render?size=${res}`;
    img.onload = () => draw();
    imgCache.set(key, img);
    return img;
}

// ---- Drawing ----
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw ground line at y=0
    const groundScreen = worldToScreen(0, 0);
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, groundScreen.sy);
    ctx.lineTo(canvas.width, groundScreen.sy);
    ctx.stroke();

    // Draw grid
    drawGrid();

    // Draw each ship
    for (const item of shipLayout) {
        const sizePx = item.size * cam.pxPerMeter;
        if (sizePx < 1) continue; // too small to see

        const { sx, sy } = worldToScreen(item.x, item.y);

        // Cull off-screen
        const halfPx = sizePx / 2;
        if (sx + halfPx < 0 || sx - halfPx > canvas.width) continue;
        if (sy + halfPx < 0 || sy - halfPx > canvas.height) continue;

        const img = getImage(item.ship.typeID, sizePx);
        if (img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, sx - halfPx, sy - halfPx, sizePx, sizePx);
        } else {
            // Placeholder circle
            ctx.strokeStyle = '#2a2a4e';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(sx, sy, halfPx, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Label if big enough
        if (sizePx > 40) {
            const fontSize = Math.max(10, Math.min(14, sizePx * 0.08));
            ctx.font = `${fontSize}px 'Segoe UI', system-ui, sans-serif`;
            ctx.fillStyle = 'rgba(150, 150, 150, 0.8)';
            ctx.textAlign = 'center';
            // Ship name below the ship
            const labelY = sy + halfPx + fontSize + 4;
            ctx.fillText(item.ship.name, sx, labelY);
            // Size below name
            ctx.fillStyle = 'rgba(79, 195, 247, 0.6)';
            ctx.font = `${fontSize * 0.8}px 'Segoe UI', system-ui, sans-serif`;
            ctx.fillText(formatSize(item.size), sx, labelY + fontSize);
        }
    }

    updateRuler();
    updateScaleInfo();
}

function drawGrid() {
    // Adaptive grid based on zoom level
    const viewWidthM = canvas.width / cam.pxPerMeter;

    // Pick grid spacing: nice round number
    const candidates = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 50000, 100000, 500000];
    const targetLines = 8;
    const idealSpacing = viewWidthM / targetLines;
    const spacing = candidates.find(c => c >= idealSpacing) || candidates[candidates.length - 1];

    const pxSpacing = spacing * cam.pxPerMeter;
    if (pxSpacing < 20) return; // too dense

    // World bounds visible
    const topLeft = screenToWorld(0, 0);
    const bottomRight = screenToWorld(canvas.width, canvas.height);

    const startX = Math.floor(topLeft.wx / spacing) * spacing;
    const endX = Math.ceil(bottomRight.wx / spacing) * spacing;
    const startY = Math.floor(bottomRight.wy / spacing) * spacing;
    const endY = Math.ceil(topLeft.wy / spacing) * spacing;

    ctx.strokeStyle = 'rgba(30, 30, 50, 0.5)';
    ctx.lineWidth = 0.5;

    // Vertical lines
    for (let wx = startX; wx <= endX; wx += spacing) {
        const { sx } = worldToScreen(wx, 0);
        ctx.beginPath();
        ctx.moveTo(sx, 0);
        ctx.lineTo(sx, canvas.height);
        ctx.stroke();
    }

    // Horizontal lines
    for (let wy = startY; wy <= endY; wy += spacing) {
        const { sy } = worldToScreen(0, wy);
        ctx.beginPath();
        ctx.moveTo(0, sy);
        ctx.lineTo(canvas.width, sy);
        ctx.stroke();
    }
}

function formatSize(meters) {
    if (meters >= 1000) return `${(meters / 1000).toFixed(1)} km`;
    return `${Math.round(meters)} m`;
}

// ---- Camera controls ----
function fitToContent() {
    if (shipLayout.length === 0) return;

    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const item of shipLayout) {
        const half = item.size / 2;
        minX = Math.min(minX, item.x - half);
        maxX = Math.max(maxX, item.x + half);
        minY = Math.min(minY, item.y - half);
        maxY = Math.max(maxY, item.y + half);
    }

    const worldW = maxX - minX;
    const worldH = maxY - minY;
    const headerH = 90;
    const margin = 1.1; // 10% margin

    const scaleX = canvas.width / (worldW * margin);
    const scaleY = (canvas.height - headerH) / (worldH * margin);

    cam.pxPerMeter = Math.min(scaleX, scaleY);
    cam.pxPerMeter = Math.max(MIN_SCALE, Math.min(MAX_SCALE, cam.pxPerMeter));
    cam.x = (minX + maxX) / 2;
    cam.y = (minY + maxY) / 2 + (headerH / 2) / cam.pxPerMeter;
}

function zoomAt(screenX, screenY, factor) {
    const before = screenToWorld(screenX, screenY);
    cam.pxPerMeter = Math.max(MIN_SCALE, Math.min(MAX_SCALE, cam.pxPerMeter * factor));
    const after = screenToWorld(screenX, screenY);
    cam.x += before.wx - after.wx;
    cam.y += before.wy - after.wy;
    draw();
}

// ---- Mouse / touch interaction ----
let isDragging = false;
let dragStartX, dragStartY;
let dragStartCamX, dragStartCamY;
let hasMoved = false;

viewport.addEventListener('mousedown', (e) => {
    if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT' || e.target.tagName === 'OPTION') return;
    isDragging = true;
    hasMoved = false;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragStartCamX = cam.x;
    dragStartCamY = cam.y;
    viewport.classList.add('dragging');
});

window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved = true;
    cam.x = dragStartCamX - dx / cam.pxPerMeter;
    cam.y = dragStartCamY + dy / cam.pxPerMeter;
    draw();
});

window.addEventListener('mouseup', () => {
    isDragging = false;
    viewport.classList.remove('dragging');
});

viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    zoomAt(e.clientX, e.clientY, factor);
}, { passive: false });

// Touch: pinch to zoom, single finger to pan
let touches = {};
let lastPinchDist = 0;
let lastPinchCenter = null;

viewport.addEventListener('touchstart', (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        touches[t.identifier] = { x: t.clientX, y: t.clientY };
    }
    const keys = Object.keys(touches);
    if (keys.length === 1) {
        isDragging = true;
        hasMoved = false;
        dragStartX = touches[keys[0]].x;
        dragStartY = touches[keys[0]].y;
        dragStartCamX = cam.x;
        dragStartCamY = cam.y;
    } else if (keys.length >= 2) {
        const t0 = touches[keys[0]];
        const t1 = touches[keys[1]];
        lastPinchDist = Math.hypot(t1.x - t0.x, t1.y - t0.y);
        lastPinchCenter = { x: (t0.x + t1.x) / 2, y: (t0.y + t1.y) / 2 };
        isDragging = false;
    }
}, { passive: false });

viewport.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        touches[t.identifier] = { x: t.clientX, y: t.clientY };
    }
    const keys = Object.keys(touches);
    if (keys.length === 1 && isDragging) {
        const dx = touches[keys[0]].x - dragStartX;
        const dy = touches[keys[0]].y - dragStartY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved = true;
        cam.x = dragStartCamX - dx / cam.pxPerMeter;
        cam.y = dragStartCamY + dy / cam.pxPerMeter;
        draw();
    } else if (keys.length >= 2 && lastPinchCenter) {
        const t0 = touches[keys[0]];
        const t1 = touches[keys[1]];
        const dist = Math.hypot(t1.x - t0.x, t1.y - t0.y);
        const center = { x: (t0.x + t1.x) / 2, y: (t0.y + t1.y) / 2 };

        if (lastPinchDist > 0) {
            const factor = dist / lastPinchDist;
            zoomAt(center.x, center.y, factor);
        }

        // Pan with pinch center movement
        const panDx = center.x - lastPinchCenter.x;
        const panDy = center.y - lastPinchCenter.y;
        cam.x -= panDx / cam.pxPerMeter;
        cam.y += panDy / cam.pxPerMeter;

        lastPinchDist = dist;
        lastPinchCenter = center;
        draw();
    }
}, { passive: false });

viewport.addEventListener('touchend', (e) => {
    for (const t of e.changedTouches) {
        delete touches[t.identifier];
    }
    if (Object.keys(touches).length < 2) {
        lastPinchDist = 0;
        lastPinchCenter = null;
    }
    if (Object.keys(touches).length === 0) {
        isDragging = false;
    }
});

// Hover detection for tooltip
let hoveredShip = null;
viewport.addEventListener('mousemove', (e) => {
    if (isDragging) { hideTooltip(); return; }
    const { wx, wy } = screenToWorld(e.clientX, e.clientY);
    let found = null;
    for (const item of shipLayout) {
        const half = item.size / 2;
        if (wx >= item.x - half && wx <= item.x + half &&
            wy >= item.y - half && wy <= item.y + half) {
            found = item;
            break;
        }
    }
    if (found) {
        if (hoveredShip !== found) {
            hoveredShip = found;
            showTooltip(e, found.ship);
        }
        moveTooltip(e);
    } else {
        hoveredShip = null;
        hideTooltip();
    }
});

function showTooltip(e, ship) {
    const tip = document.getElementById('tooltip');
    const diameterM = ship.radius * 2;
    document.getElementById('tip-name').textContent = ship.name;
    document.getElementById('tip-detail').innerHTML = `
        <strong>Group:</strong> ${ship.group}<br>
        <strong>Diameter:</strong> ${formatSize(diameterM)}<br>
        <strong>Radius:</strong> ${formatSize(ship.radius)}<br>
        <strong>Mass:</strong> ${ship.mass ? (ship.mass / 1e6).toFixed(1) + ' kt' : 'N/A'}<br>
        <strong>Volume:</strong> ${ship.volume ? ship.volume.toLocaleString() + ' m\u00B3' : 'N/A'}
    `;
    tip.classList.add('visible');
    moveTooltip(e);
}

function moveTooltip(e) {
    const tip = document.getElementById('tooltip');
    const x = e.clientX + 15;
    const y = e.clientY + 15;
    const maxX = window.innerWidth - tip.offsetWidth - 10;
    const maxY = window.innerHeight - tip.offsetHeight - 10;
    tip.style.left = Math.min(x, maxX) + 'px';
    tip.style.top = Math.min(y, maxY) + 'px';
}

function hideTooltip() {
    document.getElementById('tooltip').classList.remove('visible');
}

// ---- Ruler ----
function updateRuler() {
    const ruler = document.getElementById('ruler');
    ruler.innerHTML = '';

    const viewH = window.innerHeight - 100;
    const candidates = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 50000, 100000];
    const niceM = candidates.find(c => c * cam.pxPerMeter >= 30 && c * cam.pxPerMeter <= viewH * 0.4) || candidates[candidates.length - 1];
    const barH = niceM * cam.pxPerMeter;

    if (barH < 10) return;

    const bar = document.createElement('div');
    bar.className = 'ruler-bar';
    bar.style.height = barH + 'px';

    const tickTop = document.createElement('div');
    tickTop.className = 'ruler-tick';
    tickTop.style.top = '0px';
    bar.appendChild(tickTop);

    const tickBot = document.createElement('div');
    tickBot.className = 'ruler-tick';
    tickBot.style.bottom = '0px';
    bar.appendChild(tickBot);

    ruler.appendChild(bar);

    const label = document.createElement('div');
    label.className = 'ruler-label';
    label.textContent = formatSize(niceM);
    ruler.appendChild(label);
}

function updateScaleInfo() {
    const viewWidthM = canvas.width / cam.pxPerMeter;
    document.getElementById('scale-text').textContent = `View: ${formatSize(viewWidthM)} wide`;
}

// ---- Keyboard ----
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    const panStep = canvas.width * 0.2 / cam.pxPerMeter;
    switch (e.key) {
        case '+': case '=': zoomAt(canvas.width / 2, canvas.height / 2, 1.5); break;
        case '-': zoomAt(canvas.width / 2, canvas.height / 2, 1 / 1.5); break;
        case '0': fitToContent(); draw(); break;
        case 'ArrowLeft': cam.x -= panStep; draw(); break;
        case 'ArrowRight': cam.x += panStep; draw(); break;
        case 'ArrowUp': cam.y += panStep; draw(); break;
        case 'ArrowDown': cam.y -= panStep; draw(); break;
    }
});

// ---- Filter event listeners ----
document.getElementById('group-filter').addEventListener('change', applyFilters);
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('sort-by').addEventListener('change', applyFilters);

// Prevent header interactions from triggering canvas drag
document.querySelector('header').addEventListener('mousedown', (e) => e.stopPropagation());
document.querySelector('header').addEventListener('touchstart', (e) => e.stopPropagation());

// ---- Init ----
loadData();
</script>

</body>
</html>
